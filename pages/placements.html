<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Placement Analytics</title>

<link rel="stylesheet"
href="../css/placements.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h1>

📊 Placement Analytics Dashboard

</h1>


<!-- TOP STATS -->

<div class="stats">

<div class="stat-card">

<h2>₹56 LPA</h2>

<p>Highest Package</p>

</div>

<div class="stat-card">

<h2>₹22 LPA</h2>

<p>Average Package</p>

</div>

<div class="stat-card">

<h2>96%</h2>

<p>Placement Rate</p>

</div>

<div class="stat-card">

<h2>500+</h2>

<p>Recruiters</p>

</div>

</div>



<!-- PACKAGE GRAPH -->

<div class="chart-card">

<h2>

Branch-wise Average Package

</h2>

<canvas id="packageChart">

</canvas>

</div>



<!-- YEAR GRAPH -->

<div class="chart-card">

<h2>

Year-wise Comparison

</h2>

<canvas id="yearChart">

</canvas>

</div>



<!-- TOP RECRUITERS -->

<div class="recruiters">

<h2>

🌍 Top Recruiters

</h2>

<div class="recruiter-cards">

<div class="company">

Google

</div>

<div class="company">

Microsoft

</div>

<div class="company">

Amazon

</div>

<div class="company">

Nvidia

</div>

<div class="company">

Adobe

</div>

<div class="company">

Goldman Sachs

</div>

<div class="company">

Samsung

</div>

<div class="company">

JP Morgan

</div>

</div>

</div>

</div>

<script src="../js/placements.js"></script>

</body>

</html>
