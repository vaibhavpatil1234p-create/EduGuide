<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Settings</title>

<link rel="stylesheet"
href="../css/settings.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<div class="container">

<h1>

⚙️ Settings

</h1>


<div class="cards">

<div class="card">

<h2>

👤 Profile Picture

</h2>

<input type="file">

</div>



<div class="card">

<h2>

🌙 Dark Mode

</h2>

<button onclick="toggleTheme()">

Enable Dark Mode

</button>

</div>



<div class="card">

<h2>

🔔 Notifications

</h2>

<button>

Turn On

</button>

</div>



<div class="card">

<h2>

🔐 Change Password

</h2>

<button>

Update Password

</button>

</div>



<div class="card">

<h2>

🚪 Logout

</h2>

<button onclick="logout()">

Logout

</button>

</div>

</div>

</div>

<script src="../js/settings.js"></script>

</body>

</html>
